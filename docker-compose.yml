services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sportflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: sportflow_nginx
    ports:
      - '8000:80'
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:15
    container_name: sportflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
volumes:
    postgres_data:
      